# Spring Boot configuration
spring.application.name=ExamSeatingArrangementSystem
server.port=8080

# Database configuration
spring.datasource.url=jdbc:mysql://localhost:3306/exam_seating_db_v2?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Ramesh@45

# JPA configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Flyway configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1.0.0
spring.flyway.locations=classpath:db/migration

# Other configurations
spring.thymeleaf.cache=false
spring.jackson.time-zone=Asia/Kolkata
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

admin.secret.key=EXAM@ADMIN#2026

qr.code.width=200
qr.code.height=200
qr.code.margin=1

logging.level.org.springframework.mail=DEBUG
logging.level.jakarta.mail=DEBUG
logging.level.com.sun.mail=DEBUG
logging.level.com.exam.seating=DEBUG
logging.level.com.exam.seating.service.impl.HallTicketServiceImpl=DEBUG
logging.level.com.exam.seating.controller.HallTicketController=DEBUG